name: zenora
description: Zenora - Health Intelligence App for Stress Monitoring
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  # ── NEW FEATURES ────────────────────────────────────────────────────────────
  vibration: ^2.0.0          # Pressure therapy haptic patterns
  geolocator: ^13.0.1        # GPS location for fall detection (FREE)
  url_launcher: ^6.3.0       # SMS / phone call / WhatsApp launch

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
