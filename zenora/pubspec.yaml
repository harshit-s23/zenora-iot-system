name: zenora
description: Zenora - Health Intelligence App for Stress Monitoring
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0           # Required base for all Firebase packages
  firebase_database: ^11.1.4      # Realtime Database — streams + writes

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
